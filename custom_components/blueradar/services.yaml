track:
  name: Track BLE device
  description: Add a BLE MAC address to BlueRadar's tracked devices.
  fields:
    mac:
      name: MAC
      description: BLE MAC address (e.g. AA:BB:CC:DD:EE:FF).
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    name:
      name: Friendly name
      description: Optional friendly name (informational only).
      required: false
      example: "My BLE Beacon"
      selector:
        text:

untrack:
  name: Untrack BLE device
  description: Remove a BLE MAC address from BlueRadar's tracked devices.
  fields:
    mac:
      name: MAC
      description: BLE MAC address.
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:

refresh:
  name: Refresh BLE list
  description: Force a re-poll of the bluetooth integration's device list.
